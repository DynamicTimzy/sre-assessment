# Fleet Agent Policy — System Integration for VM Monitoring
# Export from Kibana: Fleet → Agent policies → Export
# Enroll agents: elastic-agent enroll --url=<fleet-url> --enrollment-token=<token>

id: sre-assessment-vm-policy
name: SRE Assessment - VM System Monitoring
namespace: default
description: Host-level monitoring for bastion and CI runner VMs
is_default: false
monitoring_enabled:
  - logs
  - metrics

inputs:
  - type: system/metrics
    enabled: true
    streams:
      - id: system-metrics
        enabled: true
        data_stream:
          dataset: system.cpu
        metricsets:
          - cpu           # per-core and aggregate utilization
          - load          # 1/5/15 min load averages
          - memory        # used, available, cached, buffered
          - network       # bytes in/out, packets, errors, drops
          - diskio        # read/write IOPS, throughput
          - filesystem    # % used, inodes
          - process       # process counts
          - process_summary
        period: 10s
        processors:
          - add_fields:
              target: labels
              fields:
                environment: assessment
                monitoring.tier: infrastructure

  - type: filestream
    enabled: true
    streams:
      - id: system-syslog
        enabled: true
        data_stream:
          dataset: system.syslog
        paths:
          - /var/log/syslog
          - /var/log/auth.log
        processors:
          - add_fields:
              target: labels
              fields:
                log.type: system

# Agent enrollment commands (run on each VM):
#
# Bastion host:
#   curl -L -O https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-8.12.0-linux-x86_64.tar.gz
#   tar xzf elastic-agent-8.12.0-linux-x86_64.tar.gz
#   cd elastic-agent-8.12.0-linux-x86_64
#   sudo ./elastic-agent install \
#     --url=https://fleet-server:8220 \
#     --enrollment-token=<BASTION_ENROLLMENT_TOKEN> \
#     --tag bastion,assessment
#
# CI runner:
#   (same steps with CI_RUNNER_ENROLLMENT_TOKEN and --tag ci-runner,assessment)
