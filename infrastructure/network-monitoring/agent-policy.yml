# Network Policy and Firewall Flow Log Monitoring

# --- Kubernetes NetworkPolicy Flow Logs (Calico) ---
# Enable Felix flow logs in Calico ConfigMap:
#   apiVersion: projectcalico.org/v3
#   kind: FelixConfiguration
#   metadata:
#     name: default
#   spec:
#     flowLogsFileEnabled: true
#     flowLogsFileIncludeLabels: true

inputs:
  - type: filestream
    enabled: true
    streams:
      - id: calico-flow-logs
        enabled: true
        data_stream:
          dataset: network.flow
        paths:
          - /var/log/calico/flowlogs/flows.log
        parsers:
          - ndjson:
              target: ""
        processors:
          - add_fields:
              target: labels
              fields:
                log.source: calico-flow

  # Kubernetes audit logs for NetworkPolicy changes
  - type: filestream
    enabled: true
    streams:
      - id: k8s-audit-logs
        enabled: true
        data_stream:
          dataset: kubernetes.audit
        paths:
          - /var/log/kubernetes/audit/audit.log
        processors:
          - decode_json_fields:
              fields: ["message"]
              target: "kubernetes.audit"
          - drop_event:
              when:
                not:
                  equals:
                    kubernetes.audit.objectRef.resource: "networkpolicies"

# --- Cloud Firewall Logs ---
  - type: gcp/firewall
    enabled: true
    project_id: "${GCP_PROJECT_ID}"
    subscription_name: "firewall-logs-sub"
    period: 60s
    processors:
      - add_fields:
          target: labels
          fields:
            log.source: cloud-firewall

# Kibana Discover — denied connections:
#   data_stream.dataset: network.flow AND network.flow.action: deny
#   | STATS count = COUNT(*) BY source.namespace, destination.port
#   | SORT count DESC

# Kibana Lens panel: denied connections over time
#   Index: logs-network.flow-*
#   X-axis: @timestamp (date histogram)
#   Y-axis: Count
#   Breakdown: network.flow.action (deny only)
#   Drilldown filter: source.namespace
